info:
  name: Get User
  type: http
  seq: 1

http:
  method: GET
  url: "{{base_url}}/auth/me"
  headers:
    - name: Accept
      value: application/json
    - name: Content-Type
      value: application/json
    - name: Origin
      value: 127.0.0.1:8000
    - name: Referer
      value: 127.0.0.1:8000
    - name: X-XSRF-TOKEN
      value: "{{xsrf_token}}"
    - name: Cookie
      value: XSRF-TOKEN={{xsrf_token}}; attendance-management-session={{session}}
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
