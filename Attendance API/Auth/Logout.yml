info:
  name: Logout
  type: http
  seq: 3

http:
  method: POST
  url: "{{base_url}}/auth/revoke-token"
  headers:
    - name: Accept
      value: application/json
    - name: Content-Type
      value: application/json
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
