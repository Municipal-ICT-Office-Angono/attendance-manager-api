info:
  name: Get Employees
  type: http
  seq: 1

http:
  method: GET
  url: "{{base_url}}/hris/employees?sort_by=full_name&sort_order=desc"
  headers:
    - name: ""
      value: ""
  params:
    - name: sort_by
      value: full_name
      type: query
    - name: sort_order
      value: desc
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
