opencollection: 1.0.0

info:
  name: Attendance API
config:
  proxy:
    inherit: true
    config:
      protocol: http
      hostname: ""
      port: ""
      auth:
        username: ""
        password: ""
      bypassProxy: ""

request:
  headers:
    - name: Content-Type
      value: application/json
    - name: Accept
      value: application/json
  auth:
    type: bearer
    token: "{{token}}"
bundled: false
extensions:
  bruno:
    ignore:
      - node_modules
      - .git
