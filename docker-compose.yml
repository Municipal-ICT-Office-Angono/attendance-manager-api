  # 2. The Background Queue Worker
  # queue:
  #   build:
  #     context: .
  #   restart: unless-stopped
  #   command: php artisan queue:work --tries=3
  #   env_file:
  #     - .env
  #   depends_on:
  #     - db
  #     - redis
  #   networks:
  #     - default

  # 3. Redis
  # redis:
  #   image: redis:alpine
  #   restart: unless-stopped
  #   volumes:
  #     - redis-data:/data
  #   networks:
  #     - default
  redis:
    image: redis:alpine
    networks:
      - sail

  # 4. Database (PostgreSQL)
  # db:
  #   image: postgres:16-alpine
  #   restart: unless-stopped
  #   environment:
  #     POSTGRES_DB: ${DB_DATABASE:-attendance_manager_api}
  #     POSTGRES_USER: ${DB_USERNAME:-postgres}
  #     POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
  #   ports:
  #     - '5432:5432'
  #   volumes:
  #     - postgres-data:/var/lib/postgresql/data
  #   networks:
  #     - default
  pgsql:
    image: 'postgres:16'
    ports:
        - '5432:5432'
    environment:
        POSTGRES_DB: '${DB_DATABASE}'
        POSTGRES_USER: '${DB_USERNAME}'
        POSTGRES_PASSWORD: '${DB_PASSWORD}'
    volumes:
        - 'sail-pgsql:/var/lib/postgresql/data'
    networks:
        - sail

volumes:
#   redis-data:
#   postgres-data:
  sail-pgsql:
    driver: local

networks:
#   dokploy-network:
#     external: true
  sail:
    driver: bridge